apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-despacho
  namespace: innovatech
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend-despacho
  template:
    metadata:
      labels:
        app: frontend-despacho
    spec:
      containers:
        - name: frontend-despacho
          image: ${FRONTEND_DESPACHO_IMAGE}
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-despacho-service
  namespace: innovatech
spec:
  type: LoadBalancer
  selector:
    app: frontend-despacho
  ports:
    - port: 80
      targetPort: 80